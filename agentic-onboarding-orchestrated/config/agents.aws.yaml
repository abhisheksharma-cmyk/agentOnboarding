llm_profiles:
  aws_primary:
    provider: openai_compatible
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    api_key_env: AWS_BEDROCK_GATEWAY_KEY
    base_url: ${AWS_BEDROCK_OPENAI_BASE_URL}
    temperature: 0.1
    max_tokens: 700
    timeout_ms: 15000

agents:
  ADDRESS_VERIFICATION:
    active: address_v1
    versions:
      address_v1:
        type: http
        endpoint: ${ADDRESS_AGENT_URL}
        timeout_ms: 20000
        enabled: true

  KYC:
    active: kyc_langgraph_v1
    versions:
      kyc_langgraph_v1:
        type: langgraph
        endpoint: ""
        timeout_ms: 15000
        enabled: true
        langgraph:
          llm_profile: aws_primary
          prompt:
            system_prompt: >
              KYC decision agent for regulated onboarding.
              Escalate when identity proof quality is uncertain.
            user_prompt_template: |
              Slot: {slot}
              Context JSON:
              {context_json}

              Payload JSON:
              {payload_json}

              {output_format_instructions}

  AML:
    active: aml_langgraph_v1
    versions:
      aml_langgraph_v1:
        type: langgraph
        endpoint: ""
        timeout_ms: 15000
        enabled: true
        langgraph:
          llm_profile: aws_primary
          prompt:
            system_prompt: >
              AML decision agent for regulated onboarding.
            user_prompt_template: |
              Slot: {slot}
              Context JSON:
              {context_json}

              Payload JSON:
              {payload_json}

              {output_format_instructions}

  CREDIT:
    active: credit_langgraph_v1
    versions:
      credit_langgraph_v1:
        type: langgraph
        endpoint: ""
        timeout_ms: 15000
        enabled: true
        langgraph:
          llm_profile: aws_primary
          prompt:
            system_prompt: >
              Credit decision agent. Conservative policy first.
            user_prompt_template: |
              Slot: {slot}
              Context JSON:
              {context_json}

              Payload JSON:
              {payload_json}

              {output_format_instructions}

  RISK:
    active: risk_langgraph_v1
    versions:
      risk_langgraph_v1:
        type: langgraph
        endpoint: ""
        timeout_ms: 15000
        enabled: true
        langgraph:
          llm_profile: aws_primary
          prompt:
            system_prompt: >
              Risk consolidation agent. Prefer escalate over unsafe approve.
            user_prompt_template: |
              Slot: {slot}
              Context JSON:
              {context_json}

              Payload JSON:
              {payload_json}

              {output_format_instructions}
